name: Build ARF-Shuka-Edition

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ARF-Shuka-Edition
        uses: actions/checkout@v4
        with:
          path: shuka-edition

      - name: Clone Flipper Zero official firmware (shallow)
        run: |
          git clone --depth 1 https://github.com/flipperdevices/flipperzero-firmware.git flipper-fw
          cd flipper-fw
          git submodule update --init --recursive --depth 1

      - name: Copy ARF-Shuka-Edition files into firmware tree
        run: |
          REPO=flipper-fw
          SHUKA=shuka-edition

          # All new protocol + crypto files (exclude files that need ARF-specific API)
          for f in $SHUKA/new_files/*.c; do
            fname=$(basename "$f")
            # desktop_scene_boot_text.c goes to scenes/, not protocols/
            [ "$fname" = "desktop_scene_boot_text.c" ] && continue
            # scan_automotive.c uses ARF-only API not present in official firmware
            [ "$fname" = "scan_automotive.c" ] && continue
            cp "$f" $REPO/lib/subghz/protocols/
          done
          cp $SHUKA/new_files/*.h  $REPO/lib/subghz/protocols/
          # Desktop boot scene goes to scenes folder only
          cp $SHUKA/new_files/desktop_scene_boot_text.c \
             $REPO/applications/services/desktop/scenes/

          # Modified protocol files
          cp $SHUKA/modified_files/keeloq.c          $REPO/lib/subghz/protocols/
          cp $SHUKA/modified_files/protocol_items.c  $REPO/lib/subghz/protocols/
          cp $SHUKA/modified_files/protocol_items.h  $REPO/lib/subghz/protocols/

          # custom_btn + ARF global state (goes into blocks/)
          cp $SHUKA/modified_files/custom_btn.c                    $REPO/lib/subghz/blocks/
          cp $SHUKA/modified_files/custom_btn.h                    $REPO/lib/subghz/blocks/
          cp $SHUKA/modified_files/custom_btn_i.h                  $REPO/lib/subghz/blocks/
          cp $SHUKA/modified_files/subghz_block_generic_global.c   $REPO/lib/subghz/blocks/
          cp $SHUKA/modified_files/subghz_block_generic_global.h   $REPO/lib/subghz/blocks/
          cp $SHUKA/modified_files/generic.h                       $REPO/lib/subghz/blocks/

          # keystore_i.h + ARF-extended subghz_keystore.c (goes into lib/subghz/)
          cp $SHUKA/modified_files/subghz_keystore_i.h  $REPO/lib/subghz/
          cp $SHUKA/modified_files/subghz_keystore.c    $REPO/lib/subghz/

          # ARF extensions to types and decoder (decoder gets _long hash, types gets new fields)
          cp $SHUKA/modified_files/types.h     $REPO/lib/subghz/
          cp $SHUKA/modified_files/decoder.h   $REPO/lib/subghz/blocks/
          cp $SHUKA/modified_files/decoder.c   $REPO/lib/subghz/blocks/
          cp $SHUKA/modified_files/keeloq.h    $REPO/lib/subghz/protocols/

          # furi_hal_crypto extensions
          cp $SHUKA/modified_files/furi_hal_crypto.c $REPO/targets/f7/furi_hal/
          cp $SHUKA/modified_files/furi_hal_crypto.h $REPO/targets/f7/furi_hal/

          # Desktop service files
          cp $SHUKA/modified_files/desktop.c             $REPO/applications/services/desktop/
          cp $SHUKA/modified_files/desktop_events.h      $REPO/applications/services/desktop/views/
          cp $SHUKA/modified_files/desktop_scene_config.h \
             $REPO/applications/services/desktop/scenes/

          # Remove stock kia.c — our kia_v0-v7 replace it (same exported symbols)
          rm -f $REPO/lib/subghz/protocols/kia.c \
                $REPO/lib/subghz/protocols/kia.h

          echo "Files copied OK"

      - name: Set up Python & fbt toolchain
        run: |
          sudo apt-get install -y python3-pip scons gcc-arm-none-eabi
          cd flipper-fw
          python3 -m pip install --upgrade pip
          pip3 install pyserial protobuf heatshrink2

      - name: Build firmware
        run: |
          cd flipper-fw
          ./fbt COMPACT=1 DEBUG=0 \
            DIST_SUFFIX="arf-shuka-edition" \
            updater_package 2>&1 | tee build.log
          echo "Build complete"

      - name: Check firmware size
        run: |
          DFU=$(find flipper-fw/dist -name "*.dfu" 2>/dev/null | head -1)
          if [ -n "$DFU" ]; then
            bash shuka-edition/scripts/check_size.sh "$DFU"
          else
            echo "No .dfu found in dist/ — checking build output"
            find flipper-fw -name "*.dfu" | head -5
          fi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find flipper-fw/dist -name "*.dfu" -o -name "*.tgz" -o -name "*.zip" 2>/dev/null \
            | xargs -I{} cp {} artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARF-Shuka-Edition-${{ github.sha }}
          path: artifacts/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            ## ARF-Shuka-Edition ${{ github.ref_name }}

            Flash with qFlipper (`.dfu`) or OTA via the update bundle (`.tgz`).

            **Note:** built with `DIST_SUFFIX=arf-shuka-edition` — qFlipper will
            show "arf-shuka-edition" as the version string.

            See [README](README.md) for full flashing instructions and protocol list.
          draft: false
          prerelease: false
