name: Build ARF-Shuka-Edition

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout ARF-Shuka-Edition
        uses: actions/checkout@v4
        with:
          path: shuka-edition

      - name: Clone Flipper-ARF base firmware (shallow)
        run: |
          git clone --depth 1 https://github.com/D4C1-Labs/Flipper-ARF.git flipper-fw
          cd flipper-fw
          git submodule update --init --recursive --depth 1

      - name: Stamp version string
        run: |
          cd flipper-fw
          # fbt reads `git describe --tags --always` to build the string shown
          # in Settings → About. Tag HEAD so it shows our name instead of ARF's.
          GIT_COMMITTER_NAME="shuka0158" \
          GIT_COMMITTER_EMAIL="noreply@github.com" \
          git tag "ARF-Shuka-Edition"
          git describe --tags --always

      - name: Apply Shuka-Edition modified files
        run: |
          REPO=flipper-fw
          SHUKA=shuka-edition

          # Overlay every file in modified_files/ at the same relative path inside the ARF clone
          find $SHUKA/modified_files -type f | while read src; do
            relative="${src#$SHUKA/modified_files/}"
            dest="$REPO/$relative"
            mkdir -p "$(dirname "$dest")"
            cp "$src" "$dest"
            echo "  patched: $relative"
          done
          echo "Modified files applied"

      - name: Add Shuka-Edition protocols on top of ARF
        run: |
          REPO=flipper-fw
          SHUKA=shuka-edition
          PROTO=$REPO/lib/subghz/protocols

          # ── Unique protocols not in upstream ARF ──────────────────────────
          # GM Rolling (GM/Chevrolet/Buick/Cadillac rolling-code RKE)
          cp $SHUKA/new_files/gm_rolling.c   $PROTO/
          cp $SHUKA/new_files/gm_rolling.h   $PROTO/

          # Honda Static is excluded — at 2.8 KB it pushes us over the STM32WB C2 boundary

          # Nissan (Nissan/Infiniti RKE)
          cp $SHUKA/new_files/nissan.c       $PROTO/
          cp $SHUKA/new_files/nissan.h       $PROTO/

          # Renault/Dacia RKE
          cp $SHUKA/new_files/renault.c      $PROTO/
          cp $SHUKA/new_files/renault.h      $PROTO/

          # toyota_lexus — modern Toyota/Lexus 2003-2020 (72-bit PWM + CRC-8)
          # ARF's toyota.c covers older Corolla Verso/Tundra dual-variant — both coexist
          cp $SHUKA/new_files/toyota_lexus.c $PROTO/
          cp $SHUKA/new_files/toyota_lexus.h $PROTO/

          # ── Patch protocol_items.h — add our includes after toyota.h ─────
          sed -i \
            's|#include "toyota.h"|#include "toyota.h"\n#include "gm_rolling.h"\n#include "nissan.h"\n#include "renault.h"\n#include "toyota_lexus.h"|' \
            $PROTO/protocol_items.h

          # ── Patch protocol_items.c — add entries after &subghz_protocol_toyota ─
          sed -i '/subghz_protocol_toyota,$/a\    \&subghz_protocol_toyota_lexus,\n    \&subghz_protocol_gm_rolling,\n    \&subghz_protocol_nissan,\n    \&subghz_protocol_renault,' \
            $PROTO/protocol_items.c

          echo "All Shuka-Edition protocols added OK"
          grep -c "subghz_protocol_\|_protocol," $PROTO/protocol_items.c || true

      - name: Set up Python & fbt toolchain
        run: |
          sudo apt-get install -y python3-pip scons gcc-arm-none-eabi
          cd flipper-fw
          python3 -m pip install --upgrade pip
          pip3 install pyserial protobuf heatshrink2

      - name: Build firmware
        run: |
          cd flipper-fw
          ./fbt COMPACT=1 DEBUG=0 \
            DIST_SUFFIX="arf-shuka-edition" \
            updater_package 2>&1 | tee build.log
          echo "Build complete"

      - name: Check firmware size
        run: |
          DFU=$(find flipper-fw/dist -name "*.dfu" 2>/dev/null | head -1)
          if [ -n "$DFU" ]; then
            bash shuka-edition/scripts/check_size.sh "$DFU"
          else
            echo "No .dfu found in dist/ — checking build output"
            find flipper-fw -name "*.dfu" | head -5
          fi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find flipper-fw/dist -name "*.dfu" -o -name "*.tgz" -o -name "*.zip" 2>/dev/null \
            | xargs -I{} cp {} artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARF-Shuka-Edition-${{ github.sha }}
          path: artifacts/
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Build {0}', github.run_number) }}
          files: artifacts/*
          body: |
            ## ARF-Shuka-Edition ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.run_number) }}

            Flash with qFlipper (`.dfu`) or OTA via the update bundle (`.tgz`).

            See [README](README.md) for full flashing instructions and protocol list.
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
