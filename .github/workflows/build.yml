name: Build ARF-Shuka-Edition

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '**.md'
  workflow_dispatch: {}

jobs:
  test:
    name: Crypto unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile & run crypto test vectors
        run: |
          cd tests
          echo "== AUT64 block cipher =="
          gcc -I.. -O2 -Wall -Werror -o test_aut64 test_aut64.c ../new_files/aut64.c
          ./test_aut64
          echo "== KeeLoq rolling code =="
          gcc -I.. -O2 -Wall -Werror -o test_keeloq test_keeloq.c
          ./test_keeloq

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - name: Checkout ARF-Shuka-Edition
        uses: actions/checkout@v4
        with:
          path: shuka-edition

      - name: Clone Flipper-ARF base firmware (shallow)
        run: |
          ARF_TAG=$(cat shuka-edition/ARF_VERSION 2>/dev/null | tr -d '[:space:]')
          if [ -n "$ARF_TAG" ]; then
            echo "Cloning ARF tag: $ARF_TAG"
            git clone --depth 1 --branch "$ARF_TAG" \
              https://github.com/D4C1-Labs/Flipper-ARF.git flipper-fw
          else
            echo "No ARF_VERSION found — cloning latest HEAD"
            git clone --depth 1 https://github.com/D4C1-Labs/Flipper-ARF.git flipper-fw
          fi
          cd flipper-fw
          git submodule update --init --recursive --depth 1
          echo "ARF_TAG=${ARF_TAG:-HEAD}" >> "$GITHUB_ENV"

      - name: Stamp version string
        run: |
          echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"
          cd flipper-fw
          # fbt reads `git describe --tags --always` to build the string shown
          # in Settings → About. Tag HEAD so it shows our name instead of ARF's.
          GIT_COMMITTER_NAME="shuka0158" \
          GIT_COMMITTER_EMAIL="noreply@github.com" \
          git tag "ARF-Shuka-Edition"
          git describe --tags --always

      - name: Add missing apps from official Flipper firmware
        run: |
          # Only add apps that are truly absent from ARF — never overwrite ARF's own
          # version, because system FAPs (like cli_ikey) may depend on ARF's API.
          CORE_APPS="applications/main/infrared applications/main/ibutton applications/main/bad_usb applications/main/u2f"
          NEED=""
          for app in infrared ibutton bad_usb u2f; do
            if [ ! -d "flipper-fw/applications/main/${app}" ]; then
              NEED="$NEED applications/main/${app}"
              echo "  missing: ${app} — will add from official firmware"
            else
              echo "  present: ${app} — keeping ARF's version"
            fi
          done
          if [ -n "$NEED" ]; then
            git clone --depth 1 --filter=blob:none --sparse \
              https://github.com/flipperdevices/flipperzero-firmware.git flipper-official
            cd flipper-official
            git sparse-checkout set $NEED
            cd ..
            for app in infrared ibutton bad_usb u2f; do
              dest="flipper-fw/applications/main/${app}"
              src="flipper-official/applications/main/${app}"
              if [ ! -d "$dest" ] && [ -d "$src" ]; then
                cp -r "$src" "$dest"
                echo "  added: ${app}"
              fi
            done
            rm -rf flipper-official
          fi
          echo "Core apps patched OK"

      - name: Apply Shuka-Edition modified files
        run: |
          REPO=flipper-fw
          SHUKA=shuka-edition

          # Overlay every file in modified_files/ at the same relative path inside the ARF clone
          find $SHUKA/modified_files -type f | while read src; do
            relative="${src#$SHUKA/modified_files/}"
            dest="$REPO/$relative"
            mkdir -p "$(dirname "$dest")"
            cp "$src" "$dest"
            echo "  patched: $relative"
          done
          echo "Modified files applied"

      - name: Customize firmware branding
        run: |
          # Replace "ARF-Firmware" firmware name with "Shuka-ARF" in all source files
          grep -rl "ARF-Firmware" flipper-fw/ \
            --include="*.c" --include="*.h" --include="*.py" --include="*.scons" \
            2>/dev/null | xargs -r sed -i 's/ARF-Firmware/Shuka-ARF/g'
          echo "Firmware name patched"

          # Patch about.c to add attribution lines
          python3 shuka-edition/scripts/patch_about.py

      - name: Strip low-coverage ARF protocols to recover flash space
        run: |
          PROTO=flipper-fw/lib/subghz/protocols

          # Remove 3rd-party system FAPs that use official-only APIs absent in ARF's SDK.
          # 1) Grep-based: symbols/headers ARF removed (catches ir_remote, xremote, etc.)
          BROKEN=$(grep -rl \
            "InfraredSettings\|FuriHalInfraredTxPin\|furi_hal_infrared_set_tx_output\|INFRARED_SETTINGS_PATH\|furi_hal_infrared_detect_tx_output\|ibutton/ibutton_key\.h" \
            flipper-fw/applications/system/ --include="*.c" --include="*.h" 2>/dev/null \
            | sed "s|flipper-fw/applications/system/||" | cut -d/ -f1 | sort -u)
          for app in $BROKEN; do
            rm -rf "flipper-fw/applications/system/${app}"
            echo "  removed incompatible system FAP: ${app}"
          done
          # 2) Find FAPs by appid in their .fam file and delete their directory.
          #    cli_ikey builds ibutton_cli.c which needs ibutton_key.h (missing in ARF SDK).
          for appid in cli_ikey; do
            FAM=$(grep -rl "\"${appid}\"" flipper-fw/applications/ --include="*.fam" 2>/dev/null | head -1)
            if [ -n "$FAM" ]; then
              FAP_DIR=$(dirname "$FAM")
              rm -rf "$FAP_DIR"
              echo "  removed incompatible FAP '${appid}' at ${FAP_DIR}"
            else
              echo "  FAP '${appid}' not found by appid — skipping"
            fi
          done
          echo "System FAP cleanup done"

          # Remove Russian aftermarket protocols — regional, rarely encountered outside RU.
          # Scher-Khan (37 KB src), Sheriff CFM (23 KB src), Star Line (42 KB src)
          # together account for ~4–6 KB of compiled flash.
          for proto in scher_khan sheriff_cfm star_line; do
            rm -f $PROTO/${proto}.c $PROTO/${proto}.h
            sed -i "/#include \"${proto}.h\"/d"          $PROTO/protocol_items.h
            sed -i "/subghz_protocol_${proto},/d"        $PROTO/protocol_items.c
            echo "Stripped: $proto"
          done

      - name: Add Shuka-Edition protocols on top of ARF
        run: |
          REPO=flipper-fw
          SHUKA=shuka-edition
          PROTO=$REPO/lib/subghz/protocols

          # ── Unique protocols not in upstream ARF ──────────────────────────
          # GM Rolling (GM/Chevrolet/Buick/Cadillac rolling-code RKE)
          cp $SHUKA/new_files/gm_rolling.c   $PROTO/
          cp $SHUKA/new_files/gm_rolling.h   $PROTO/

          # Nissan (Nissan/Infiniti RKE)
          cp $SHUKA/new_files/nissan.c       $PROTO/
          cp $SHUKA/new_files/nissan.h       $PROTO/

          # Renault/Dacia RKE
          cp $SHUKA/new_files/renault.c      $PROTO/
          cp $SHUKA/new_files/renault.h      $PROTO/

          # toyota_lexus — modern Toyota/Lexus 2003-2020 (72-bit PWM + CRC-8)
          # ARF's toyota.c covers older Corolla Verso/Tundra dual-variant — both coexist
          cp $SHUKA/new_files/toyota_lexus.c $PROTO/
          cp $SHUKA/new_files/toyota_lexus.h $PROTO/

          # Honda/Acura rolling-code RKE (2007+, 315/433 MHz, CRC-8 poly 0x2F)
          cp $SHUKA/new_files/honda_acura.c  $PROTO/
          cp $SHUKA/new_files/honda_acura.h  $PROTO/

          # Hyundai New RKE (2017+ Hyundai/Genesis, 433 MHz, CRC-8 poly 0x31)
          cp $SHUKA/new_files/hyundai_new.c  $PROTO/
          cp $SHUKA/new_files/hyundai_new.h  $PROTO/

          # X10 home automation protocol (310 MHz AM, 32-bit with inverted byte validation)
          # Only add if not already present in ARF
          if ! grep -q '#include "x10.h"' $PROTO/protocol_items.h 2>/dev/null; then
            cp $SHUKA/new_files/x10.c $PROTO/
            cp $SHUKA/new_files/x10.h $PROTO/
            echo "  x10 protocol will be registered"
          else
            echo "  x10 already in ARF — skipping copy"
          fi

          # ── Patch protocol_items.h — add our includes after toyota.h ─────
          if ! grep -q '#include "toyota.h"' $PROTO/protocol_items.h; then
            echo "ERROR: toyota.h include not found in protocol_items.h — ARF changed its layout" >&2
            exit 1
          fi
          sed -i \
            's|#include "toyota.h"|#include "toyota.h"\n#include "gm_rolling.h"\n#include "nissan.h"\n#include "renault.h"\n#include "toyota_lexus.h"\n#include "honda_acura.h"\n#include "hyundai_new.h"|' \
            $PROTO/protocol_items.h
          grep -q '#include "gm_rolling.h"' $PROTO/protocol_items.h || { echo "ERROR: header patch failed" >&2; exit 1; }
          # Add x10 include if not already present
          if [ -f "$PROTO/x10.h" ] && ! grep -q '#include "x10.h"' $PROTO/protocol_items.h; then
            sed -i 's|#include "hyundai_new.h"|#include "hyundai_new.h"\n#include "x10.h"|' $PROTO/protocol_items.h
            echo "  x10 include added"
          fi

          # ── Patch protocol_items.c — add entries after &subghz_protocol_toyota ─
          if ! grep -q 'subghz_protocol_toyota,$' $PROTO/protocol_items.c; then
            echo "ERROR: subghz_protocol_toyota entry not found in protocol_items.c — ARF changed its layout" >&2
            exit 1
          fi
          sed -i '/subghz_protocol_toyota,$/a\    \&subghz_protocol_toyota_lexus,\n    \&subghz_protocol_gm_rolling,\n    \&subghz_protocol_nissan,\n    \&subghz_protocol_renault,\n    \&subghz_protocol_honda_acura,\n    \&subghz_protocol_hyundai_new,' \
            $PROTO/protocol_items.c
          grep -q 'subghz_protocol_gm_rolling' $PROTO/protocol_items.c || { echo "ERROR: protocol_items.c patch failed" >&2; exit 1; }
          # Add x10 entry if not already present
          if [ -f "$PROTO/x10.c" ] && ! grep -q 'subghz_protocol_x10,' $PROTO/protocol_items.c; then
            sed -i '/subghz_protocol_hyundai_new,$/a\    \&subghz_protocol_x10,' $PROTO/protocol_items.c
            echo "  x10 protocol registered"
          fi

          echo "All Shuka-Edition protocols added OK"

      - name: Apply custom boot splash
        run: |
          REPO=flipper-fw
          SHUKA=shuka-edition

          # Replace ARF's slideshow frames with our branded ones
          cp $SHUKA/new_files/assets/slideshow/update_default/frame_*.png \
             $REPO/assets/slideshow/update_default/
          cp $SHUKA/new_files/assets/slideshow/first_start/frame_*.png \
             $REPO/assets/slideshow/first_start/
          echo "Boot splash applied"

      - name: Preset Dolphin XP to max level
        run: |
          python3 shuka-edition/scripts/patch_dolphin_level.py

      - name: Set up Python & fbt toolchain
        run: |
          sudo apt-get install -y python3-pip scons gcc-arm-none-eabi
          cd flipper-fw
          python3 -m pip install --upgrade pip
          pip3 install pyserial protobuf heatshrink2

      - name: Embed custom animations into firmware resources
        run: |
          pip3 install -q Pillow
          EXTERN=flipper-fw/assets/dolphin/external

          # Remove ARF's stock external animations — only our 4 will remain
          rm -rf "${EXTERN:?}"/*

          # Generate directly into the dolphin external path fbt expects.
          # DolphinExtBuilder packs this folder into resources.ths → deployed to
          # /int/dolphin/ during OTA install, so no SD card required.
          python3 shuka-edition/scripts/generate_animations.py "$EXTERN"

          echo "Custom animations embedded:"
          ls -la "$EXTERN/"
          echo "Manifest:"
          cat "$EXTERN/manifest.txt"

          # Also zip for the GitHub Release — users can copy to SD card too
          mkdir -p artifacts_anim
          cp -r "$EXTERN/" artifacts_anim/ARF-Shuka-animations
          (cd artifacts_anim && zip -r ARF-Shuka-animations.zip ARF-Shuka-animations/ -x "*.DS_Store")
          echo "Animation SD pack built."
        env:
          PYTHONUNBUFFERED: "1"



      - name: Build firmware
        run: |
          cd flipper-fw
          ./fbt COMPACT=1 DEBUG=0 \
            DIST_SUFFIX="arf-shuka-edition" \
            updater_package 2>&1 | tee build.log

          if find dist -name "*.dfu" | grep -q .; then
            echo "Build OK — .dfu produced"
          else
            echo "Build FAILED — no .dfu found" >&2
            tail -40 build.log >&2
            exit 1
          fi

      - name: Check firmware size
        run: |
          DFU=$(find flipper-fw/dist -name "flipper-z-f7-full-*.dfu" 2>/dev/null | head -1)
          if [ -z "$DFU" ]; then
            echo "ERROR: main firmware DFU (flipper-z-f7-full-*.dfu) not found in dist/" >&2
            find flipper-fw/dist -name "*.dfu" | sort
            exit 1
          fi
          bash shuka-edition/scripts/check_size.sh "$DFU"

      - name: Collect artifacts
        run: |
          mkdir -p artifacts

          # Show what fbt actually produced so we can debug missing files
          echo "=== dist/ contents ==="
          find flipper-fw/dist -type f | sort

          # Copy DFU and any tgz fbt may have made
          find flipper-fw/dist \( -name "*.dfu" -o -name "*.tgz" \) | xargs -I{} cp {} artifacts/ 2>/dev/null || true

          # ARF's fbt does not generate update.fuf — create it manually then tar the bundle.
          UPDATE_DIR=$(find flipper-fw/dist -maxdepth 3 -type d -name "*update*" | grep -v '\.dfu' | head -1)
          if [ -n "$UPDATE_DIR" ]; then
            echo "Update directory: $UPDATE_DIR"
            ls -la "$UPDATE_DIR/"

            # Compute CRC32 of updater.bin (required by Flipper Format manifest).
            # Output is little-endian hex bytes separated by spaces (e.g. "AB CD EF 12").
            UPDATER_BIN=$(find "$UPDATE_DIR" -name "updater.bin" | head -1)
            if [ -n "$UPDATER_BIN" ]; then
              LOADER_CRC=$(python3 -c "import struct,zlib; d=open('${UPDATER_BIN}','rb').read(); print(' '.join(f'{b:02X}' for b in struct.pack('<I',zlib.crc32(d)&0xFFFFFFFF)))")
              LOADER_LINE=$'Loader: updater.bin\n'"Loader CRC: $LOADER_CRC"
            else
              echo "WARNING: updater.bin not found — omitting Loader fields"
              LOADER_LINE=""
            fi

            # Generate update.fuf in Flipper Format (not INI).
            {
              echo "Filetype: Flipper firmware upgrade configuration"
              echo "Version: 2"
              echo "Info: ARF-Shuka-Edition"
              echo "Target: 7"
              [ -n "$LOADER_LINE" ] && echo "$LOADER_LINE"
              echo "Firmware: firmware.dfu"
              # Include splashscreen if present
              [ -f "$UPDATE_DIR/splash.bin" ] && echo "Splashscreen: splash.bin"
            } > "$UPDATE_DIR/update.fuf"
            echo "Generated update.fuf:"
            cat "$UPDATE_DIR/update.fuf"

            # Slim down resources.ths to only core FAPs so qFlipper's MD5
            # check finishes in time. Users' existing SD card apps are untouched
            # (Flipper updater only overwrites files present in resources.ths).
            RESOURCES_THS="$UPDATE_DIR/resources.ths"
            if [ -f "$RESOURCES_THS" ]; then
              pip3 install -q heatshrink2
              python3 shuka-edition/scripts/slim_resources.py "$RESOURCES_THS"
              echo "resources.ths slimmed OK"
            fi

            BUNDLE_NAME="flipper-z-f7-update-arf-shuka-edition.tgz"
            tar -czf "artifacts/${BUNDLE_NAME}" \
              --exclude='*/radio.bin' \
              -C "$(dirname "$UPDATE_DIR")" "$(basename "$UPDATE_DIR")"
            echo "Created OTA bundle: ${BUNDLE_NAME} ($(du -sh artifacts/${BUNDLE_NAME} | cut -f1))"
          else
            echo "WARNING: no update directory found in dist/ — OTA web flash will not work"
            find flipper-fw/dist -type d | sort
          fi

          # Include animation pack
          cp artifacts_anim/ARF-Shuka-animations.zip artifacts/ 2>/dev/null || true
          echo "=== artifacts/ ==="
          ls -lh artifacts/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARF-Shuka-Edition-${{ github.sha }}
          path: artifacts/
          retention-days: 30

      - name: Publish OTA bundle to docs/ for same-origin web flash
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          BUNDLE=$(ls artifacts/flipper-z-f7-update-arf-shuka-edition.tgz 2>/dev/null || ls artifacts/*.tgz 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "No .tgz to publish — web flash will not work"
            exit 0
          fi
          cp "$BUNDLE" shuka-edition/docs/latest-update.tgz
          # Also publish the full DFU for the web flasher DFU recovery mode
          DFU_FULL=$(find artifacts -name "flipper-z-f7-full-*.dfu" | head -1)
          if [ -n "$DFU_FULL" ]; then
            cp "$DFU_FULL" shuka-edition/docs/latest-full.dfu
            echo "DFU published to docs/latest-full.dfu ($(du -sh shuka-edition/docs/latest-full.dfu | cut -f1))"
          fi
          # latest-build.txt: SHORT_SHA, ARF_TAG, ISO timestamp (one per line)
          printf '%s\n%s\n%s\n' \
            "${{ env.SHORT_SHA }}" \
            "${{ env.ARF_TAG }}" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > shuka-edition/docs/latest-build.txt
          cd shuka-edition
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest-update.tgz docs/latest-build.txt docs/flash.html docs/latest-full.dfu 2>/dev/null || true
          git commit -m "ci: publish OTA bundle ${{ env.SHORT_SHA }} [skip ci]" || echo "Nothing to commit"
          git push

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || env.SHORT_SHA }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || env.SHORT_SHA }}
          files: artifacts/*
          body: |
            ## ARF-Shuka-Edition ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || env.SHORT_SHA }}

            **Based on ARF:** `${{ env.ARF_TAG }}`

            ### How to install

            **Recommended — download `flipper-z-f7-update-arf-shuka-edition.tgz`**
            Open qFlipper → Install from file → select the `.tgz`
            Updates firmware + Infrared, NFC, RFID, GPIO, Bad USB, U2F apps in one step.

            **Firmware only — download `flipper-z-f7-full-arf-shuka-edition.dfu`**
            Open qFlipper → Install from file → select the `.dfu`
            Updates the firmware binary only, does not touch your SD card.

            See [README](README.md) for full instructions and protocol list.
          draft: false
          prerelease: false
