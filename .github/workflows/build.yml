name: Build ARF-Shuka-Edition

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ARF-Shuka-Edition
        uses: actions/checkout@v4
        with:
          path: shuka-edition

      - name: Clone Flipper-ARF base firmware (shallow)
        run: |
          git clone --depth 1 https://github.com/D4C1-Labs/Flipper-ARF.git flipper-fw
          cd flipper-fw
          git submodule update --init --recursive --depth 1

      - name: Add toyota_lexus protocol (our unique addition)
        run: |
          REPO=flipper-fw
          SHUKA=shuka-edition

          # toyota_lexus.c/h — covers Corolla/Camry/RAV4/Hilux/Land Cruiser/Lexus IS-RX-GS
          # (2003-2020, 72-bit PWM + CRC-8). ARF's toyota.c covers older Verso/Tundra variants.
          cp $SHUKA/new_files/toyota_lexus.c $REPO/lib/subghz/protocols/
          cp $SHUKA/new_files/toyota_lexus.h $REPO/lib/subghz/protocols/

          # Patch protocol_items.h — add include after toyota.h
          sed -i 's|#include "toyota.h"|#include "toyota.h"\n#include "toyota_lexus.h"|' \
            $REPO/lib/subghz/protocols/protocol_items.h

          # Patch protocol_items.c — append toyota_lexus entry after the toyota line
          sed -i '/subghz_protocol_toyota,$/a\    \&subghz_protocol_toyota_lexus,' \
            $REPO/lib/subghz/protocols/protocol_items.c

          echo "toyota_lexus added OK"

      - name: Set up Python & fbt toolchain
        run: |
          sudo apt-get install -y python3-pip scons gcc-arm-none-eabi
          cd flipper-fw
          python3 -m pip install --upgrade pip
          pip3 install pyserial protobuf heatshrink2

      - name: Build firmware
        run: |
          cd flipper-fw
          ./fbt COMPACT=1 DEBUG=0 \
            DIST_SUFFIX="arf-shuka-edition" \
            updater_package 2>&1 | tee build.log
          echo "Build complete"

      - name: Check firmware size
        run: |
          DFU=$(find flipper-fw/dist -name "*.dfu" 2>/dev/null | head -1)
          if [ -n "$DFU" ]; then
            bash shuka-edition/scripts/check_size.sh "$DFU"
          else
            echo "No .dfu found in dist/ — checking build output"
            find flipper-fw -name "*.dfu" | head -5
          fi

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find flipper-fw/dist -name "*.dfu" -o -name "*.tgz" -o -name "*.zip" 2>/dev/null \
            | xargs -I{} cp {} artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARF-Shuka-Edition-${{ github.sha }}
          path: artifacts/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            ## ARF-Shuka-Edition ${{ github.ref_name }}

            Flash with qFlipper (`.dfu`) or OTA via the update bundle (`.tgz`).

            **Note:** built with `DIST_SUFFIX=arf-shuka-edition` — qFlipper will
            show "arf-shuka-edition" as the version string.

            See [README](README.md) for full flashing instructions and protocol list.
          draft: false
          prerelease: false
