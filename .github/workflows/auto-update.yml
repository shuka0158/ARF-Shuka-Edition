name: Auto-sync ARF upstream

on:
  schedule:
    # Check for new ARF releases every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: {}   # allow manual trigger too

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout ARF-Shuka-Edition
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check ARF for new release
        id: check
        run: |
          LATEST=$(gh api repos/D4C1-Labs/Flipper-ARF/releases/latest --jq '.tag_name')
          CURRENT=$(cat ARF_VERSION | tr -d '[:space:]')
          echo "ARF latest : $LATEST"
          echo "We last built: $CURRENT"
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "new=true"  >> "$GITHUB_OUTPUT"
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          else
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "No new ARF release — nothing to do."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump ARF_VERSION and trigger build
        if: steps.check.outputs.new == 'true'
        run: |
          TAG=${{ steps.check.outputs.tag }}
          echo "$TAG" > ARF_VERSION
          git config user.name  "arf-shuka-bot"
          git config user.email "noreply@github.com"
          git add ARF_VERSION
          git commit -m "chore: sync to ARF $TAG"
          git push
          echo "Pushed ARF_VERSION=$TAG"
          # GITHUB_TOKEN pushes don't trigger other workflows — fire build explicitly
          gh workflow run build.yml --ref main
          echo "Triggered build.yml for $TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
