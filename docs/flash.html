<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ARF-Shuka-Edition Web Flasher</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#0a0a0a;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
main{max-width:480px;width:100%}
h1{font-size:1.5rem;color:#ff8c00;letter-spacing:.05em}
.sub{color:#555;font-size:.8rem;margin-bottom:1.5rem;margin-top:.2rem}
.card{background:#111;border:1px solid #222;border-radius:8px;padding:.9rem 1rem;margin-bottom:1.2rem;font-size:.8rem;line-height:1.7;color:#888}
.card b{color:#ccc}
.card .val{color:#ff8c00}
#flashBtn{width:100%;padding:.8rem;background:#ff8c00;color:#000;border:none;border-radius:6px;font-family:monospace;font-size:1rem;font-weight:bold;cursor:pointer;letter-spacing:.03em;transition:opacity .15s}
#flashBtn:disabled{opacity:.35;cursor:not-allowed}
#flashBtn:hover:not(:disabled){opacity:.82}
.prog-wrap{margin-top:1rem;display:none}
progress{width:100%;height:6px;appearance:none;border:none;border-radius:3px;background:#1e1e1e}
progress::-webkit-progress-bar{background:#1e1e1e;border-radius:3px}
progress::-webkit-progress-value{background:#ff8c00;border-radius:3px;transition:width .25s}
#status{margin-top:.5rem;font-size:.75rem;color:#666;min-height:1.1em;word-break:break-all}
#status.err{color:#e05555}
#status.ok{color:#55c55a}
.log{margin-top:.8rem;background:#050505;border:1px solid #1a1a1a;border-radius:6px;padding:.6rem .8rem;font-size:.72rem;color:#555;max-height:200px;overflow-y:auto;line-height:1.7;display:none}
.log .ok{color:#5cd47a}.log .er{color:#f06060}.log .in{color:#ffb060}.log .dm{color:#333}
.note{margin-top:1.4rem;font-size:.72rem;color:#444;line-height:1.6}
.note a{color:#555;text-decoration:none}
.note a:hover{color:#888}
</style>
</head>
<body>
<main>
  <h1>ARF-Shuka-Edition</h1>
  <p class="sub">Web Flasher &mdash; Chrome / Edge only</p>

  <div class="card" id="versionBox">Loading version info&hellip;</div>

  <button id="flashBtn">&#9889; Connect &amp; Flash Flipper</button>

  <div class="prog-wrap" id="progWrap">
    <progress id="prog" value="0" max="100"></progress>
    <div id="status"></div>
  </div>

  <div class="log" id="log"></div>

  <p class="note">
    Requires <a href="https://caniuse.com/web-serial" target="_blank">WebSerial</a> (Chrome&nbsp;89+, Edge&nbsp;89+).
    Firefox is not supported.<br>
    Flipper must be on the <b>home screen</b> before clicking Flash.
    Do not unplug during install (~30&nbsp;s after trigger).
  </p>
</main>

<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/protobufjs@7.4.0/dist/protobuf.min.js"></script>
<script>
'use strict';

// ── CONFIG ───────────────────────────────────────────────────────
const TGZ_URL = 'latest-update.tgz';
const CHUNK   = 512;
const VID     = 0x0483;

// ── PROTOBUF SCHEMA (FoxFW v56 — field numbers verified against real proto source) ──
const PROTO_JSON = {
  nested: { PB: { nested: {
    Main: {
      oneofs: { content: { oneof: [
        'storageWriteRequest','storageMkdirRequest',
        'systemUpdateRequest','systemUpdateResponse','systemRebootRequest',
        'systemPingRequest','systemPingResponse'
      ]}},
      fields: {
        commandId:            { type:'uint32', id:1 },
        commandStatus:        { type:'uint32', id:2 },
        hasNext:              { type:'bool',   id:3 },
        systemPingRequest:    { type:'PB.System.PingRequest',    id:5  },
        systemPingResponse:   { type:'PB.System.PingResponse',   id:6  },
        storageWriteRequest:  { type:'PB.Storage.WriteRequest',  id:11 },
        storageMkdirRequest:  { type:'PB.Storage.MkdirRequest',  id:13 },
        systemUpdateRequest:  { type:'PB.System.UpdateRequest',  id:41 },
        systemUpdateResponse: { type:'PB.System.UpdateResponse', id:46 },
        systemRebootRequest:  { type:'PB.System.RebootRequest',  id:31 }
      }
    },
    Storage: { nested: {
      WriteRequest: { fields: { path:{type:'string',id:1,options:{}}, file:{type:'PB.Storage.File',id:2} } },
      File:         { fields: { data:{type:'bytes',id:4} } },
      MkdirRequest: { fields: { path:{type:'string',id:1} } }
    }},
    System: { nested: {
      PingRequest:    { fields: { data:          {type:'bytes', id:1} } },
      PingResponse:   { fields: { data:          {type:'bytes', id:1} } },
      UpdateRequest:  { fields: { updateManifest:{type:'string',id:1} } },
      UpdateResponse: { fields: { code:          {type:'uint32',id:1} } },
      RebootRequest:  { fields: { mode:          {type:'uint32',id:1} } }
    }}
  }}}
};

let PBRoot, Main;
function initProto() {
  PBRoot = protobuf.Root.fromJSON(PROTO_JSON);
  Main   = PBRoot.lookupType('PB.Main');
}
function encodeMain(obj) {
  const err = Main.verify(obj);
  if (err) throw new Error('Protobuf encode error: ' + err);
  return Main.encodeDelimited(obj).finish(); // varint(length) + message bytes
}

// ── STATE ────────────────────────────────────────────────────────
let cmdId = 1;
let serialPort = null, serialWriter = null, serialReader = null;
let rxQueue = [], pumpActive = false, pumpTask = null;

// ── PUMP (FoxFW v56 — single continuous reader, never release/re-acquire) ──
function startPump() {
  rxQueue = []; pumpActive = true;
  pumpTask = (async () => {
    try {
      while (pumpActive) {
        const { value, done } = await serialReader.read();
        if (done) break;
        if (value && value.length) {
          for (const b of value) rxQueue.push(b);
          if (rxQueue.length > 200000) rxQueue.splice(0, rxQueue.length - 200000);
        }
      }
    } catch {}
  })();
}
async function stopPump() {
  pumpActive = false;
  try { await serialReader.cancel(); } catch {}
  try { await pumpTask; } catch {}
}
async function waitForQuiet(idleMs, maxMs) {
  const deadline = Date.now() + maxMs;
  let lastLen = rxQueue.length, lastChange = Date.now();
  while (Date.now() < deadline) {
    await sleep(50);
    if (rxQueue.length !== lastLen) { lastLen = rxQueue.length; lastChange = Date.now(); }
    if (Date.now() - lastChange >= idleMs) break;
  }
  if (rxQueue.length) rxQueue.length = 0;
}
async function waitForByte(byteVal, timeoutMs) {
  const deadline = Date.now() + timeoutMs;
  while (Date.now() < deadline) {
    const idx = rxQueue.indexOf(byteVal);
    if (idx !== -1) { rxQueue.splice(0, idx + 1); return true; }
    await sleep(50);
  }
  return false;
}
async function readResp(timeoutMs, expectCmdId = -1) {
  const deadline = Date.now() + timeoutMs;
  while (Date.now() < deadline) {
    while (rxQueue.length > 0) {
      let pos = 0, msgLen = 0, shift = 0;
      while (pos < rxQueue.length && pos < 5) {
        const b = rxQueue[pos++];
        msgLen |= (b & 0x7F) << shift; shift += 7;
        if ((b & 0x80) === 0) break;
      }
      if (pos === 0) break;
      if (msgLen === 0 || msgLen > 65535) { rxQueue.shift(); continue; }
      if (rxQueue.length < pos + msgLen) break;
      const payload = rxQueue.slice(pos, pos + msgLen);
      try {
        const msg = Main.decode(new Uint8Array(payload));
        rxQueue.splice(0, pos + msgLen);
        dbg('resp cmdId='+msg.commandId+' status='+msg.commandStatus);
        if (expectCmdId >= 0 && msg.commandId !== expectCmdId) continue;
        return msg;
      } catch { rxQueue.shift(); continue; }
    }
    await sleep(50);
  }
  return null;
}

// ── UI ───────────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));
const $prog  = document.getElementById('prog');
const $wrap  = document.getElementById('progWrap');
const $stat  = document.getElementById('status');
const $log   = document.getElementById('log');
let lastProgressEl = null;

function setStatus(msg, cls = '') {
  $stat.textContent = msg;
  $stat.className   = cls;
}
function setProgress(v) { $prog.value = Math.round(v * 100); }

function dbg(msg) {
  const el = document.createElement('div');
  el.className = 'dm';
  el.textContent = '> ' + msg;
  $log.appendChild(el); $log.scrollTop = 9e9;
  lastProgressEl = null;
}
function logLine(msg, cls) {
  const el = document.createElement('div');
  if (cls) el.className = cls;
  el.textContent = '> ' + msg;
  $log.appendChild(el); $log.scrollTop = 9e9;
  lastProgressEl = null;
}
function logProgress(msg) {
  if (lastProgressEl) { lastProgressEl.textContent = '> ' + msg; }
  else {
    const el = document.createElement('div');
    el.textContent = '> ' + msg;
    $log.appendChild(el);
    lastProgressEl = el;
  }
  $log.scrollTop = 9e9;
}

// ── RPC HELPERS ──────────────────────────────────────────────────
async function wMsg(bytes) {
  await Promise.race([
    serialWriter.write(bytes),
    sleep(30000).then(() => { throw new Error('Write timeout — Flipper stopped accepting data'); })
  ]);
}
async function rpcMkdir(path) {
  const id = cmdId++;
  await serialWriter.write(encodeMain({ commandId:id, storageMkdirRequest:{ path } }));
  const resp = await readResp(5000, id);
  dbg('mkdir ' + path + ': status=' + (resp ? resp.commandStatus : 'timeout'));
}
async function rpcWriteFile(path, data, onProgress) {
  const id = cmdId++;
  for (let i = 0; i < data.length; i += CHUNK) {
    const chunk   = data.slice(i, i + CHUNK);
    const hasNext = (i + CHUNK) < data.length;
    await wMsg(encodeMain({
      commandId: id, hasNext,
      storageWriteRequest: { path, file: { data: chunk } } // path on every chunk
    }));
    await sleep(7); // flat inter-chunk gap (matches lab.flipper.net)
    if (onProgress) onProgress(Math.min(i + CHUNK, data.length) / data.length);
    const pct = Math.round(Math.min(i + CHUNK, data.length) / data.length * 100);
    if (pct !== Math.round(i / data.length * 100)) logProgress('Uploading: ' + pct + '%');
    if (!hasNext) {
      const waitMs = Math.min(30000, Math.max(5000, Math.ceil(data.length / 50000) * 1000));
      setStatus('Writing to SD card…');
      const resp = await readResp(waitMs, id);
      if (resp && resp.commandStatus && resp.commandStatus !== 0)
        throw new Error('Write failed for ' + path + ': error code ' + resp.commandStatus);
      break;
    }
  }
}

// ── MAIN FLASH FLOW ──────────────────────────────────────────────
async function doFlash() {
  const btn = document.getElementById('flashBtn');
  btn.disabled = true;
  $wrap.style.display = 'block';
  $log.style.display  = 'block';
  $log.innerHTML = '';
  setProgress(0); setStatus('');

  try {
    // 1. Port picker
    setStatus('Select your Flipper in the port picker…');
    let port;
    try {
      port = await navigator.serial.requestPort({ filters:[{ usbVendorId:VID }] });
    } catch (e) {
      setStatus('No port selected — plug in your Flipper and try again.');
      btn.disabled = false;
      return;
    }

    // 2. Open serial — FoxFW v56 approach: 115200 + hardware flow + DTR
    try {
      await port.open({ baudRate:115200, flowControl:'hardware' });
    } catch (e) {
      await port.open({ baudRate:115200 });
    }
    await port.setSignals({ dataTerminalReady:true, requestToSend:true });
    serialWriter = port.writable.getWriter();
    serialReader = port.readable.getReader();
    serialPort = port;
    cmdId = 1;
    startPump();
    logLine('Port opened + DTR asserted', 'ok');

    // 3. Start RPC session — FoxFW v56 approach
    setStatus('Starting RPC session…');
    await waitForQuiet(300, 5000);
    await serialWriter.write(new TextEncoder().encode('\r\n'));
    await waitForQuiet(200, 2000);
    await serialWriter.write(new TextEncoder().encode('start_rpc_session\r')); // bare \r, NOT \r\n
    const gotAck = await waitForByte(0x0A, 3000);
    if (!gotAck) throw new Error('Flipper did not acknowledge start_rpc_session. Make sure Flipper is on the HOME SCREEN.');
    logLine('start_rpc_session acknowledged ✓', 'ok');

    const pingId = cmdId++;
    await serialWriter.write(encodeMain({ commandId:pingId, systemPingRequest:{} }));
    const pong = await readResp(6000, pingId);
    if (!pong) throw new Error('RPC ping timed out — reboot Flipper and try again.');
    logLine('RPC session active ✓', 'ok');
    setProgress(0.03);

    // 4. Download TGZ
    setStatus('Downloading firmware…');
    const tgz = await fetchXHR(TGZ_URL, p => { setProgress(0.03 + p * 0.25); setStatus('Downloading… ' + Math.round(p*100) + '%'); });
    logLine('Downloaded ' + (tgz.length/1024/1024).toFixed(1) + ' MB', 'ok');
    setProgress(0.28);

    // 5. Decompress + parse
    setStatus('Decompressing…');
    const tar   = pako.inflate(tgz);
    const files = parseTar(tar);
    if (!files.length) throw new Error('No files in firmware package');
    logLine('Found ' + files.length + ' files', 'ok');
    setProgress(0.32);

    const topDir     = files[0].name.split('/')[0];
    const sdBase     = '/ext/update/' + topDir;
    const manifest   = files.find(f => f.name.endsWith('update.fuf'));
    if (!manifest) throw new Error('update.fuf not found in package');
    const manifestSD = '/ext/update/' + manifest.name;

    // 6. Create directories
    setStatus('Preparing SD card…');
    await rpcMkdir('/ext/update');
    await rpcMkdir(sdBase);
    setProgress(0.35);

    // 7. Upload files
    let totalBytes = files.reduce((s, f) => s + f.data.length, 0);
    let uploadedBytes = 0;
    for (let fi = 0; fi < files.length; fi++) {
      const f = files[fi];
      setStatus('Uploading ' + f.name + ' (' + (f.data.length/1024).toFixed(0) + ' KB)…');
      logLine('Uploading ' + f.name + '…', 'in');
      await rpcWriteFile('/ext/update/' + f.name, f.data, p => {
        const done = uploadedBytes + p * f.data.length;
        setProgress(0.35 + 0.57 * done / totalBytes);
      });
      uploadedBytes += f.data.length;
      logLine('✓ ' + f.name, 'ok');
    }
    setProgress(0.93);

    // 8. Trigger update (TWO-step: validate manifest, then reboot into update)
    setStatus('Triggering firmware update…');
    const upId = cmdId++;
    await serialWriter.write(encodeMain({ commandId:upId, systemUpdateRequest:{ updateManifest:manifestSD } }));
    const upResp = await readResp(5000, upId);
    dbg('systemUpdate status=' + (upResp ? upResp.commandStatus : 'timeout'));

    await serialWriter.write(encodeMain({ commandId:cmdId++, systemRebootRequest:{ mode:2 } }));
    await sleep(1000);
    setProgress(1.0);
    setStatus('✓ Done! Flipper is installing — watch the progress bar on screen. Do NOT unplug.', 'ok');
    logLine('Update triggered — Flipper rebooting into update mode', 'ok');

  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
    logLine('FAILED: ' + e.message, 'er');
    console.error(e);
  } finally {
    btn.disabled = false;
    try { await stopPump(); } catch {}
    try { if (serialReader) serialReader.releaseLock(); } catch {}
    try { if (serialWriter) serialWriter.releaseLock(); } catch {}
    try { if (serialPort)   await serialPort.close(); } catch {}
    serialPort = serialWriter = serialReader = null;
  }
}

// ── TAR PARSER (FoxFW v56 verbatim) ─────────────────────────────
function parseTar(buf) {
  const bytes=new Uint8Array(buf),td=new TextDecoder(),files=[];
  let off=0;
  while(off+512<=bytes.length){
    if(!bytes[off])break;
    const rs=(s,l)=>{let e=s;while(e<s+l&&bytes[e])e++;return td.decode(bytes.slice(s,e)).trim();};
    const name=rs(off,100),size=parseInt(rs(off+124,12)||'0',8),type=String.fromCharCode(bytes[off+156]),prefix=rs(off+345,155),full=prefix?`${prefix}/${name}`:name;
    off+=512;
    if((type==='0'||type==='\x00')&&size>0&&!full.endsWith('/'))files.push({name:full,data:bytes.slice(off,off+size)});
    off+=Math.ceil(size/512)*512;
  }
  return files;
}

// ── XHR DOWNLOAD ────────────────────────────────────────────────
function fetchXHR(url, onProg) {
  return new Promise((ok, fail) => {
    const x = new XMLHttpRequest();
    x.open('GET', url, true); x.responseType = 'arraybuffer'; x.timeout = 180000;
    x.onprogress = e => { if (e.lengthComputable && onProg) onProg(e.loaded / e.total); };
    x.onload  = () => x.status >= 200 && x.status < 300 ? ok(new Uint8Array(x.response)) : fail(new Error('HTTP ' + x.status));
    x.onerror = () => fail(new Error('Download failed'));
    x.ontimeout = () => fail(new Error('Download timed out'));
    x.send();
  });
}

// ── INIT ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const btn = document.getElementById('flashBtn');

  if (!('serial' in navigator)) {
    btn.disabled = true;
    document.getElementById('versionBox').innerHTML =
      '&#9888; WebSerial not supported.<br>Open this page in <b>Chrome</b> or <b>Edge</b>.';
    return;
  }

  if (typeof protobuf !== 'undefined') initProto();
  else setTimeout(() => { if (typeof protobuf !== 'undefined') initProto(); }, 500);

  try {
    const lines = (await fetch('latest-build.txt').then(r => r.text())).trim().split('\n');
    document.getElementById('versionBox').innerHTML =
      `<b>Version:</b> <span class="val">${lines[0]||'?'}</span> &nbsp;`+
      `<b>ARF:</b> <span class="val">${lines[1]||'?'}</span><br>`+
      `<b>Built:</b> ${lines[2]||'?'}`;
  } catch {
    document.getElementById('versionBox').textContent = 'Version info unavailable';
  }

  btn.addEventListener('click', doFlash);
});
</script>
</body>
</html>
